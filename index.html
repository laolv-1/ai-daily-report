<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI 情报日报 | 来财主控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #00ff88;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        .header .subtitle {
            color: #888;
            margin-top: 10px;
            font-size: 0.9em;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(20, 20, 35, 0.8);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.2);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #00ff88, #00d4ff);
        }
        .card-title {
            font-size: 1.2em;
            color: #00ff88;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .card-meta {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        .card-content {
            line-height: 1.6;
            color: #ccc;
            font-size: 0.95em;
        }
        .card-tags {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tag {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        .tag.high { background: rgba(255, 68, 68, 0.1); color: #ff4444; border-color: rgba(255, 68, 68, 0.3); }
        .tag.medium { background: rgba(255, 187, 0, 0.1); color: #ffbb00; border-color: rgba(255, 187, 0, 0.3); }
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #ff4444;
            border: 2px solid #ff4444;
            border-radius: 12px;
            margin: 20px;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.8em;
            border-top: 1px solid #333;
            margin-top: 40px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI 情报日报</h1>
        <div class="subtitle">
            <span class="live-indicator"></span>
            来财主控 · 自动聚合 · 实时更新
        </div>
        <div class="subtitle" id="last-update">最后更新：加载中...</div>
    </div>

    <div class="container">
        <div id="content" class="grid">
            <div class="loading">🔄 正在加载情报数据...</div>
        </div>
    </div>

    <div class="footer">
        <p>Powered by 来财 Agent | GitHub Pages 自动部署 | 数据源：来福机器人 (Aliyun)</p>
    </div>

    <script>
        async function loadIntel() {
            try {
                const response = await fetch('daily_intel.json');
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                
                const content = document.getElementById('content');
                const lastUpdate = document.getElementById('last-update');
                
                // 更新时间
                lastUpdate.textContent = `最后更新：${data.generated_at || '未知'}`;
                
                // 渲染卡片
                if (data.intel && data.intel.length > 0) {
                    content.innerHTML = data.intel.map(item => `
                        <div class="card">
                            <div class="card-title">${item.title || '无标题'}</div>
                            <div class="card-meta">
                                <span>📅 ${item.date || '未知日期'}</span>
                                <span>🔖 ${item.source || '未知来源'}</span>
                            </div>
                            <div class="card-content">${item.summary || '无摘要'}</div>
                            <div class="card-tags">
                                ${item.tags ? item.tags.map(tag => 
                                    `<span class="tag ${tag === '高危' ? 'high' : tag === '中危' ? 'medium' : ''}">${tag}</span>`
                                ).join('') : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    content.innerHTML = '<div class="loading">📭 暂无情报数据</div>';
                }
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h3>⚠️ 数据加载失败</h3>
                        <p>${error.message}</p>
                        <p style="margin-top:10px;font-size:0.9em">请检查 daily_intel.json 是否存在</p>
                    </div>
                `;
            }
        }
        
        loadIntel();
        // 每 5 分钟自动刷新
        setInterval(loadIntel, 300000);
    </script>
</body>
</html>
