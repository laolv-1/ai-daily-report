name: 🤖 AI Daily Report Auto Build

on:
  schedule:
    # 每天 08:00 UTC (北京时间 16:00) 触发
    - cron: '0 8 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          pip install requests beautifulsoup4 aiohttp

      - name: 🔍 执行情报抓取脚本
        run: |
          python fetch_intel.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 验证 JSON 数据
        run: |
          python -m json.tool daily_intel.json > /dev/null && echo "✅ JSON 格式有效" || echo "❌ JSON 格式错误"

      - name: 🚀 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
          commit_message: "🤖 [AUTO] 情报日报更新 ${{ github.run_number }}"

      - name: 📢 推送完成通知 (可选)
        run: |
          echo "✅ 部署完成！Pages URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
