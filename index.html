<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔴 CYBER-INTEL NEVUS | 深度赛博藏经阁</title>
    <style>
        :root { --neon-cyan: #0ff; --neon-pink: #f0f; --neon-blue: #0088ff; --bg-dark: #050510; --glass-bg: rgba(10, 15, 30, 0.6); }
        body { margin: 0; font-family: 'Fira Code', 'JetBrains Mono', monospace; background: var(--bg-dark); color: #fff; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;}
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050510 100%); z-index: -1; }
        .header { text-align: center; padding: 30px 20px; border-bottom: 2px solid var(--neon-cyan); box-shadow: 0 0 20px rgba(0,255,255,0.2); background: var(--glass-bg); backdrop-filter: blur(10px); }
        .header h1 { margin: 0; font-size: 2.2rem; text-shadow: 0 0 10px var(--neon-cyan); animation: breathe 3s infinite alternate; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes breathe { 0% { text-shadow: 0 0 5px var(--neon-cyan); } 100% { text-shadow: 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-pink); } }
        
        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 20px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .search-box { width: 100%; max-width: 600px; position: relative; }
        .search-box input { width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid var(--neon-cyan); background: rgba(0,255,255,0.05); color: #fff; font-size: 1rem; outline: none; box-shadow: 0 0 10px rgba(0,255,255,0.1); transition: 0.3s; font-family: inherit;}
        .search-box input:focus { box-shadow: 0 0 20px var(--neon-cyan); background: rgba(0,255,255,0.1); }
        
        .tag-wall { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 800px; }
        .filter-tag { padding: 6px 15px; border-radius: 20px; border: 1px solid #444; background: rgba(255,255,255,0.05); cursor: pointer; font-size: 0.85rem; transition: 0.3s; color: #aaa; }
        .filter-tag:hover { border-color: var(--neon-cyan); color: #fff; }
        .filter-tag.active { border-color: var(--neon-pink); color: #fff; background: rgba(255,0,255,0.1); box-shadow: 0 0 10px var(--neon-pink); }
        
        .container { padding: 30px 20px; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 12px; padding: 25px; position: relative; overflow: hidden; transition: all 0.3s ease; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); cursor: pointer; display: flex; flex-direction: column; }
        .glass-card:hover { border-color: var(--neon-blue); box-shadow: 0 0 25px rgba(0,136,255,0.4); transform: translateY(-5px); }
        .glass-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent); transform: skewX(-25deg); transition: 0.5s; }
        .glass-card:hover::before { left: 150%; }
        
        .tag { display: inline-block; padding: 4px 10px; margin: 0 6px 10px 0; border-radius: 4px; font-size: 0.75rem; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,255,255,0.1); }
        .card-title { font-size: 1.2rem; color: #fff; margin-bottom: 10px; font-weight: bold; }
        .card-short { font-size: 0.9rem; line-height: 1.5; color: #b0c4de; margin-bottom: 15px; border-left: 2px solid var(--neon-pink); padding-left: 10px; flex: 1; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-dark); border: 1px solid var(--neon-cyan); border-radius: 15px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; padding: 30px; box-shadow: 0 0 30px rgba(0,255,255,0.2); position: relative; transform: scale(0.9); transition: 0.3s; }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 1.5rem; color: #888; cursor: pointer; transition: 0.3s; background: none; border: none; }
        .close-btn:hover { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        
        .modal-title { font-size: 1.5rem; color: #fff; margin-bottom: 15px; padding-right: 30px; text-shadow: 0 0 5px var(--neon-cyan); }
        .modal-markdown { font-size: 0.95rem; line-height: 1.7; color: #ccc; margin-bottom: 25px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 8px; border: 1px dashed rgba(255,255,255,0.1); white-space: pre-wrap; word-wrap: break-word; }
        .modal-markdown code { background: rgba(0,255,255,0.1); color: var(--neon-cyan); padding: 2px 5px; border-radius: 4px; font-family: inherit; }
        
        .action-btn { display: inline-block; padding: 12px 25px; background: rgba(0,255,255,0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .action-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }
        
        #loader { text-align: center; color: var(--neon-cyan); padding: 50px; font-size: 1.2rem; animation: breathe 1s infinite alternate; width: 100%; grid-column: 1/-1; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌐 CYBER-INTEL NEVUS v3</h1>
        <div id="timestamp" style="color: #888; font-size: 0.85rem; margin-top: 10px;">AWAITING DATALINK...</div>
    </div>
    
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="> 输入关键词全局检索 (如: Docker, 实战)..." oninput="filterIntel()">
        </div>
        <div class="tag-wall" id="tagWall"></div>
    </div>

    <div class="container">
        <div id="grid" class="grid">
            <div id="loader">ESTABLISHING SECURE CONNECTION...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(event)">&times;</button>
            <div id="modalTags" style="margin-bottom: 10px;"></div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="card-short" id="modalShort"></div>
            <div class="modal-markdown" id="modalMarkdown"></div>
            <a href="#" target="_blank" class="action-btn" id="modalLink">🔗 直达源码/原文</a>
        </div>
    </div>

    <script>
        let allData = [];
        let currentTag = 'ALL';

        async function loadData() {
            try {
                const res = await fetch('daily_intel.json?t=' + Date.now());
                const data = await res.json();
                document.getElementById('timestamp').innerText = 'LAST SYNC: ' + data.generated_at + ' | NODE: ' + data.source;
                allData = data.intel;
                extractTags(allData);
                renderGrid(allData);
            } catch (e) {
                document.getElementById('grid').innerHTML = '<div id="loader" style="color:var(--neon-pink)">ERROR: DATALINK SEVERED. SIGNAL LOST.</div>';
            }
        }

        function extractTags(items) {
            const tags = new Set();
            items.forEach(item => item.tags.forEach(t => tags.add(t)));
            let html = '<div class="filter-tag active" onclick="toggleTag('ALL', this)">[ALL]</div>';
            tags.forEach(t => {
                html += `<div class="filter-tag" onclick="toggleTag('${t}', this)">${t}</div>`;
            });
            document.getElementById('tagWall').innerHTML = html;
        }

        function toggleTag(tag, element) {
            document.querySelectorAll('.filter-tag').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentTag = tag;
            filterIntel();
        }

        function filterIntel() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(item => {
                const matchTag = currentTag === 'ALL' || item.tags.includes(currentTag);
                const matchText = item.title.toLowerCase().includes(query) || item.short_comment.toLowerCase().includes(query) || item.tags.join(' ').toLowerCase().includes(query);
                return matchTag && matchText;
            });
            renderGrid(filtered);
        }

        function renderGrid(items) {
            const grid = document.getElementById('grid');
            if (items.length === 0) {
                grid.innerHTML = '<div style="color:#666; text-align:center; grid-column:1/-1; padding: 50px;">NO DATA FRAGMENTS MATCH THE CRITERIA.</div>';
                return;
            }
            grid.innerHTML = items.map((item, index) => `
                <div class="glass-card" onclick="openModal(${index})">
                    <div style="margin-bottom: 10px;">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-short">${item.short_comment}</div>
                    <div style="font-size: 0.8rem; color: #666; margin-top: auto; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 10px;">点击展开绝密卷宗 ➜</div>
                </div>
            `).join('');
        }

        function openModal(index) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(item => {
                const matchTag = currentTag === 'ALL' || item.tags.includes(currentTag);
                const matchText = item.title.toLowerCase().includes(query) || item.short_comment.toLowerCase().includes(query) || item.tags.join(' ').toLowerCase().includes(query);
                return matchTag && matchText;
            });
            
            const item = filtered[index];
            document.getElementById('modalTags').innerHTML = item.tags.map(t => `<span class="tag">${t}</span>`).join('');
            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalShort').innerText = item.short_comment;
            document.getElementById('modalMarkdown').innerHTML = item.full_markdown.replace(/\n/g, '<br>');
            document.getElementById('modalLink').href = item.source_url;
            
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('show'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if(e.target === document.getElementById('modalOverlay') || e.target.classList.contains('close-btn')) {
                const overlay = document.getElementById('modalOverlay');
                overlay.classList.remove('show');
                setTimeout(() => { overlay.style.display = 'none'; document.body.style.overflow = 'auto'; }, 300);
            }
        }

        loadData();
    </script>
</body>
</html>
